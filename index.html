  {endX:247000,name:'终点在望',sub:'最后一搏',car:70,officer:33,sniper:82,drone:105,laser:60,carSpd:5.8,boss:false,bossHits:0,charger:80,rifle:102,riot:270},
  {endX:270000,name:'最终BOSS',sub:'逃出生天！',car:65,officer:30,sniper:76,drone:98,laser:55,carSpd:6.0,boss:true,bossHits:6,charger:75,rifle:95,riot:250},
];
let currentLevel=1,levelEndX=LEVELS[1].endX;

// ==================== 输入 ====================
const keys={};let lastWTime=0,wantDoubleJump=false;
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['KeyW','KeyA','KeyS','KeyD','KeyF','Space','ArrowUp','ArrowDown','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault();
  if(e.code==='KeyW'){const n=Date.now();if(n-lastWTime<DOUBLE_TAP_MS)wantDoubleJump=true;lastWTime=n;}
});
window.addEventListener('keyup',e=>{keys[e.code]=false});

// ==================== 音效 ====================
let audioCtx=null,bgmGain=null,sfxGain=null,sfxVolume=100,bgmNodes=[];
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();bgmGain=audioCtx.createGain();bgmGain.gain.value=.05;bgmGain.connect(audioCtx.destination);sfxGain=audioCtx.createGain();sfxGain.gain.value=sfxVolume/100;sfxGain.connect(audioCtx.destination)}catch(e){}}
function playBeep(f,d,t='square',v=.06){if(!audioCtx||!sfxGain)return;try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(sfxGain);o.start();o.stop(audioCtx.currentTime+d)}catch(e){}}
function playMelody(notes){notes.forEach((n,i)=>setTimeout(()=>playBeep(n[0],n[1]||.08,n[2]||'square',n[3]||.06),i*100));}
function stopBGM(){bgmNodes.forEach(n=>{try{n.o.stop()}catch(e){}});bgmNodes=[];}
function startBGM(){if(!audioCtx)return;stopBGM();const p=[[220,.3],[330,.3],[440,.3],[330,.3]];let i=0;const iv=setInterval(()=>{if(!audioCtx)return;const[f,d]=p[i%p.length];try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.03,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(bgmGain);o.start();o.stop(audioCtx.currentTime+d)}catch(e){}i++;},350);bgmNodes.push({o:{stop:()=>clearInterval(iv)},g:{}});}
let ambLoop=null;
function startAmbient(){if(!audioCtx||ambLoop)return;function t(){if(!audioCtx)return;playBeep(50+Math.random()*40,.5+Math.random()*.4,'sine',.008);ambLoop=setTimeout(t,3000+Math.random()*3000);}ambLoop=setTimeout(t,1000);}
function stopAmbient(){if(ambLoop)clearTimeout(ambLoop);ambLoop=null;}

// ==================== 状态 ====================
const STATE={START:'start',CHAR_SELECT:'charSelect',SHOP:'shop',PLAYING:'playing',LEVEL_COMPLETE:'levelComplete',GAMEOVER:'gameover',WIN:'win'};
let gameState=STATE.START,score=0,distance=0,comboCount=0,comboTimer=0,screenShake=0,flashAlpha=0,gameTime=0;
let levelCoins=0,totalCoins=0,comboMultiplier=1,multiplierDecay=0;
let bossData=null,shopAfterComplete=false;
let gooseBulletHits=0;
let nitroEnergy=100,nitroActive=false;
let mouseX=0,mouseY=0,mouseDown=false,draggingSlider=false;
let clearConfirm=0; // 清除存档确认计时器

// ==================== 商店数据 ====================
let shopData={
  weaponEquipped:null,defenseEquipped:null,activeSlot:0,
  armorEquipped:false,armorLevel:0,
  knifeDmg:0,knifeCD:0,pistolDmg:0,pistolCap:0,bombDmg:0,
  shield:false,shieldCD:0,
  jumpUpgrade:0,speedUpgrade:0,hpUpgrade:0,
  pistolAmmo:0,bombCount:0,flashCount:0,
};
function getArmorReduction(){return shopData.armorEquipped?[0,.3,.5,.8][Math.min(shopData.armorLevel,3)]:0;}
function getMaxHP(){return Math.floor((20+shopData.hpUpgrade*10)*charCfg.hpMul);}
function getJumpVel(){return charCfg.jumpVel-(shopData.jumpUpgrade*.5);}
function getDJumpVel(){return charCfg.dJumpVel-(shopData.jumpUpgrade*.4);}
function getPlayerSpeed(){const base=(4.5+shopData.speedUpgrade*.4)*charCfg.speedMul;return nitroActive?base*2.2:base;}
function getKnifeDmg(){return Math.floor((10+shopData.knifeDmg*2)*charCfg.dmgMul||10);}
function getKnifeCD(){return Math.max(5,30-shopData.knifeCD*5);}
function getPistolDmg(){return 4+shopData.pistolDmg*2;}
function getPistolMaxAmmo(){return 5+shopData.pistolCap;}
function getBombDmg(){return 40+shopData.bombDmg*5;}

// ==================== 武器系统 ====================
let weaponCooldown=0,weaponProjectiles=[],bombEffects=[],flashEffect=0;
let knifeSwingAngle=0,knifeSwingActive=0;

function useWeapon(){
  // 防御槽：举盾
  if(shopData.activeSlot===1){
    if(weaponCooldown>0||gameState!==STATE.PLAYING||!shopData.defenseEquipped)return;
    if(shopData.defenseEquipped==='shield'&&shopData.shieldCD<=0){
      // 盾牌已经由hitPlayer中检测，这里只做视觉反馈
      spParticles(player.x+player.width/2,player.y+player.height/2,8,'#00f5ff',3,12);
      playBeep(1000,.05,'square',.04);
      weaponCooldown=15;
    }
    return;
  }
  // 武器槽
  if(weaponCooldown>0||gameState!==STATE.PLAYING||!shopData.weaponEquipped)return;
  const wp=shopData.weaponEquipped,px=player.x+player.width/2,py=player.y+player.height/2;
  const awx=mouseX/cameraZoom+cameraX,awy=mouseY/cameraZoom;
  const adx=awx-px,ady=awy-py,ad=Math.sqrt(adx*adx+ady*ady)||1;
  const dir=adx>0?1:-1;
  switch(wp){
    case'knife':
      weaponCooldown=getKnifeCD();knifeSwingActive=12;
      playBeep(400,.04,'sawtooth',.06);
      const kd=getKnifeDmg();
      for(const o of officers){if(!o.alive)continue;const d=Math.abs(o.x+o.w/2-px),dy=Math.abs(o.y+o.h/2-py);if(d<50&&dy<45&&Math.sign(o.x+o.w/2-px)===dir||d<30&&dy<45){o.hp-=kd;if(o.hp<=0)o.alive=false;spParticles(o.x+o.w/2,o.y,6,'#fff',2,8);}}
      for(const c of chargerPolice){if(!c.alive)continue;const d=Math.abs(c.x+c.w/2-px),dy=Math.abs(c.y+c.h/2-py);if(d<50&&dy<45&&Math.sign(c.x+c.w/2-px)===dir||d<30&&dy<45){c.hp-=kd;if(c.hp<=0)c.alive=false;spParticles(c.x+c.w/2,c.y,8,'#ff9100',3,12);}}
      for(const s of shieldOfficers){if(!s.alive)continue;const d=Math.abs(s.x+s.w/2-px),dy=Math.abs(s.y+s.h/2-py);if(d<50&&dy<45){s.hp-=kd;if(s.hp<=0)s.alive=false;spParticles(s.x+s.w/2,s.y,6,'#00f5ff',2,10);}}
      for(const r of riotPolice){if(!r.alive)continue;const d=Math.abs(r.x+r.w/2-px),dy=Math.abs(r.y+r.h/2-py);if(d<55&&dy<50){const bh=Math.sign(r.x+r.w/2-px)!==dir;r.hp-=Math.floor(kd*(bh?1.5:1));playBeep(bh?600:300,.06,'sawtooth',.04);if(r.hp<=0){r.alive=false;spParticles(r.x+r.w/2,r.y,20,'#fff',5,25);}else{if(bh){r.aggro=true;r.aggroTimer=120;}spParticles(r.x+r.w/2,r.y+r.h/2,8,'#fff',2,12);}}}
      if(bossData){const b=bossData;if(Math.abs(b.x+b.w/2-px)<80&&Math.abs(b.y+b.h/2-py)<70){b.hits++;b.knockback=40;b.flashTimer=15;spParticles(b.x+b.w/2,b.y,15,'#ffeb3b',5,20);playBeep(600,.08);if(b.hits>=b.maxHits)bossDefeated();}}
      for(const sc of spawnerCages){if(Math.abs(sc.x+sc.w/2-px)<55&&Math.abs(sc.y+sc.h/2-py)<55){sc.hp-=kd;sc.flashTimer=8;spParticles(sc.x+sc.w/2,sc.y+sc.h/2,8,'#ff9100',3,12);playBeep(300,.04,'sawtooth',.04);}}
      for(const h of hunterAIs){if(h.respawnTimer>0||h.warning>0)continue;if(Math.abs(h.x+h.w/2-px)<55&&Math.abs(h.y+h.h/2-py)<45){h.hitCount++;h.flashTimer=8;applyGooseDebuff(h);if(h.hitCount>=6)gooseDefeated(h);spParticles(h.x+h.w/2,h.y+h.h/2,6,'#00f5ff',3,10);playBeep(300,.04,'sawtooth',.04);}}
      break;
    case'sword':
      weaponCooldown=40;knifeSwingActive=12;
      const sd=18+shopData.knifeDmg*3; // 剑基础18伤害
      playBeep(300,.08,'sawtooth',.07);
      for(const o of officers){if(!o.alive)continue;const d=Math.abs(o.x+o.w/2-px),dy=Math.abs(o.y+o.h/2-py);if(d<60&&dy<55&&Math.sign(o.x+o.w/2-px)===dir||d<40&&dy<55){o.hp-=sd;if(o.hp<=0)o.alive=false;spParticles(o.x+o.w/2,o.y,8,'#fff',3,10);}}
      for(const c of chargerPolice){if(!c.alive)continue;const d=Math.abs(c.x+c.w/2-px),dy=Math.abs(c.y+c.h/2-py);if(d<60&&dy<55&&Math.sign(c.x+c.w/2-px)===dir||d<40&&dy<55){c.hp-=sd;if(c.hp<=0)c.alive=false;spParticles(c.x+c.w/2,c.y,10,'#ff9100',4,15);}}
      for(const s of shieldOfficers){if(!s.alive)continue;const d=Math.abs(s.x+s.w/2-px),dy=Math.abs(s.y+s.h/2-py);if(d<60&&dy<55){s.hp-=sd;if(s.hp<=0)s.alive=false;spParticles(s.x+s.w/2,s.y,8,'#00f5ff',3,12);}}
      for(const r of riotPolice){if(!r.alive)continue;const d=Math.abs(r.x+r.w/2-px),dy=Math.abs(r.y+r.h/2-py);if(d<65&&dy<60){const bh=Math.sign(r.x+r.w/2-px)!==dir;r.hp-=Math.floor(sd*(bh?1.5:1));playBeep(bh?600:300,.06,'sawtooth',.04);if(r.hp<=0){r.alive=false;spParticles(r.x+r.w/2,r.y,25,'#fff',6,30);}else{if(bh){r.aggro=true;r.aggroTimer=120;}spParticles(r.x+r.w/2,r.y+r.h/2,10,'#fff',3,15);}}}
      if(bossData){const b=bossData;if(Math.abs(b.x+b.w/2-px)<95&&Math.abs(b.y+b.h/2-py)<80){b.hits++;b.knockback=40;b.flashTimer=15;spParticles(b.x+b.w/2,b.y,20,'#ffeb3b',6,25);playBeep(600,.08);if(b.hits>=b.maxHits)bossDefeated();}}
      for(const sc of spawnerCages){if(Math.abs(sc.x+sc.w/2-px)<60&&Math.abs(sc.y+sc.h/2-py)<60){sc.hp-=sd;sc.flashTimer=8;spParticles(sc.x+sc.w/2,sc.y+sc.h/2,10,'#ff9100',4,15);playBeep(300,.04,'sawtooth',.04);}}
      for(const h of hunterAIs){if(h.respawnTimer>0||h.warning>0)continue;if(Math.abs(h.x+h.w/2-px)<60&&Math.abs(h.y+h.h/2-py)<50){h.hitCount++;h.flashTimer=8;applyGooseDebuff(h);if(h.hitCount>=6)gooseDefeated(h);spParticles(h.x+h.w/2,h.y+h.h/2,8,'#00f5ff',4,12);playBeep(300,.04,'sawtooth',.04);}}
      break;
    case'pistol':
      weaponCooldown=12;
      weaponProjectiles.push({x:px,y:py-5,vx:adx/ad*12,vy:ady/ad*12,life:70,damage:getPistolDmg()});
      playBeep(1000,.04,'square',.03);spParticles(px+dir*15,py-5,4,'#ffeb3b',2,4);
      shopData.pistolAmmo++;if(shopData.pistolAmmo>=5){shopData.pistolAmmo=0;weaponCooldown=150;playBeep(300,.2,'square',.03);}
      break;
    case'bomb':if(shopData.bombCount<=0)return;weaponCooldown=20;shopData.bombCount--;bombEffects.push({x:px+dir*50,y:GROUND_Y-30,timer:60,radius:100});playBeep(80,.25,'sawtooth',.08);break;
    case'flash':if(shopData.flashCount<=0)return;weaponCooldown=100;shopData.flashCount--;flashEffect=120;playBeep(1500,.15,'sine',.08);screenShake=5;break;
  }
}
function processBullet(p){
  const bb={x:p.x-3,y:p.y-3,w:6,h:6};
  if(bossData){const b=bossData;if(rectsOverlap(bb,{x:b.x,y:b.y,w:b.w,h:b.h})){b.hits++;b.knockback=40;b.flashTimer=15;spParticles(p.x,p.y,8,'#ffeb3b',3,12);playBeep(600,.08);if(b.hits>=b.maxHits)bossDefeated();return true;}}
  for(const o of officers){if(!o.alive)continue;if(rectsOverlap(bb,{x:o.x,y:o.y,w:o.w,h:o.h})){o.hp-=p.damage;if(o.hp<=0)o.alive=false;return true;}}
  for(const c of chargerPolice){if(!c.alive)continue;if(rectsOverlap(bb,{x:c.x,y:c.y,w:c.w,h:c.h})){c.hp-=p.damage;if(c.hp<=0)c.alive=false;return true;}}
  for(const s of shieldOfficers){if(!s.alive)continue;if(rectsOverlap(bb,{x:s.x+s.shieldW,y:s.y,w:s.w-s.shieldW,h:s.h})){s.hp-=p.damage;if(s.hp<=0)s.alive=false;return true;}}
  for(const r of riflePolice){if(!r.alive)continue;if(rectsOverlap(bb,{x:r.x,y:r.y,w:r.w,h:r.h})){r.hp-=p.damage;if(r.hp<=0)r.alive=false;return true;}}
  for(const r of riotPolice){if(!r.alive)continue;if(rectsOverlap(bb,{x:r.x,y:r.y,w:r.w,h:r.h})){r.hp-=p.damage*.8;if(r.hp<=0)r.alive=false;return true;}}
  for(let i=policeCars.length-1;i>=0;i--){if(rectsOverlap(bb,{x:policeCars[i].x,y:policeCars[i].y,w:policeCars[i].w,h:policeCars[i].h})){policeCars[i].hp-=p.damage;if(policeCars[i].hp<=0){spParticles(policeCars[i].x,policeCars[i].y,20,'#ff1744',4,20);policeCars.splice(i,1);}return true;}}
  for(const sc of spawnerCages){if(rectsOverlap(bb,{x:sc.x,y:sc.y,w:sc.w,h:sc.h})){sc.hp-=p.damage;sc.flashTimer=8;spParticles(p.x,p.y,4,'#ff9100',2,8);return true;}}
  for(const h of hunterAIs){if(h.respawnTimer>0||h.warning>0)continue;if(rectsOverlap(bb,{x:h.x,y:h.y,w:h.w,h:h.h})){h.hitCount++;h.flashTimer=6;applyGooseDebuff(h);if(h.hitCount>=6)gooseDefeated(h);spParticles(p.x,p.y,4,'#00f5ff',2,8);return true;}}
  return false;
}
function updWeapons(){

  for(let i=bombEffects.length-1;i>=0;i--){const b=bombEffects[i];b.timer--;if(b.timer<=0){spParticles(b.x,b.y,45,'#ff9100',10,40);screenShake=18;flashAlpha=.5;const dmg=getBombDmg();
    for(const o of officers){if(o.alive&&Math.abs(o.x-b.x)<b.radius){o.hp-=dmg;if(o.hp<=0)o.alive=false;}}
    for(const c of chargerPolice){if(c.alive&&Math.abs(c.x-b.x)<b.radius){c.hp-=dmg;if(c.hp<=0)c.alive=false;}}
    for(const s of shieldOfficers){if(s.alive&&Math.abs(s.x-b.x)<b.radius){s.hp-=dmg;if(s.hp<=0)s.alive=false;}}
    for(let j=policeCars.length-1;j>=0;j--){if(Math.abs(policeCars[j].x-b.x)<b.radius){spParticles(policeCars[j].x,policeCars[j].y,25,'#ff1744',6,30);policeCars.splice(j,1);}}
    for(const r of riflePolice){if(r.alive&&Math.abs(r.x-b.x)<b.radius){r.hp-=dmg;if(r.hp<=0)r.alive=false;}}
    for(const r of riotPolice){if(r.alive&&Math.abs(r.x-b.x)<b.radius){r.hp-=Math.floor(dmg*.8);if(r.hp<=0)r.alive=false;}}
    for(let j=oilBarrels.length-1;j>=0;j--){if(oilBarrels[j].active&&Math.abs(oilBarrels[j].x-b.x)<b.radius){oilBarrels[j].active=false;spParticles(oilBarrels[j].x,oilBarrels[j].y,20,'#ff9100',6,25);}}

    if(bossData){const bo=bossData;if(Math.abs(bo.x+bo.w/2-b.x)<b.radius){bo.hits++;bo.knockback=40;bo.flashTimer=15;spParticles(bo.x+bo.w/2,bo.y,25,'#ffeb3b',8,30);if(bo.hits>=bo.maxHits)bossDefeated();}}
    for(const sc of spawnerCages){if(Math.abs(sc.x+sc.w/2-b.x)<b.radius){sc.hp-=dmg;sc.flashTimer=12;spParticles(sc.x+sc.w/2,sc.y+sc.h/2,10,'#ff9100',4,15);}}
    for(const h of hunterAIs){if(h.respawnTimer<=0&&h.warning<=0&&Math.abs(h.x+h.w/2-b.x)<b.radius){h.hitCount++;h.flashTimer=10;applyGooseDebuff(h);if(h.hitCount>=6)gooseDefeated(h);spParticles(h.x+h.w/2,h.y+h.h/2,10,'#00f5ff',4,15);}}
    bombEffects.splice(i,1);
  }else if(b.timer%10<5)spParticles(b.x,b.y,1,'#ff1744',1,3);}
  if(flashEffect>0)flashEffect--;if(knifeSwingActive>0)knifeSwingActive--;if(weaponCooldown>0)weaponCooldown--;
}

// ==================== 平台 ====================
let neonPlatforms=[],platforms=[],routeMarkers=[],upperPlatforms=[];
function generatePlatforms(){
  neonPlatforms=[];platforms=[];routeMarkers=[];upperPlatforms=[];
  const lv=LEVELS[currentLevel],stX=(currentLevel>1?LEVELS[currentLevel-1].endX:0);
  // 霓虹平台 —— 高密度
  for(let sx=stX;sx<lv.endX;sx+=80+Math.random()*60){
    const clusterSize=Math.random()<.5?3:(Math.random()<.6?2:1);
    for(let c=0;c<clusterSize;c++){
      const isRed=Math.random()<.22;
      const pw=35+Math.random()*65,ph=8;
      const py=isRed?ROAD_TOP-55-Math.random()*110:ROAD_TOP-15-Math.random()*60;
      neonPlatforms.push({x:sx+c*(pw+16+Math.random()*22),y:py,w:pw,h:ph,color:isRed?'#ff006e':'#00f5ff',glow:isRed?15:11,hasTrap:isRed&&Math.random()<.12});
    }
  }
  // 中层平台 —— 跳跃路线，翻倍密度
  for(let sx=stX;sx<lv.endX;sx+=140+Math.random()*80){
    if(Math.random()<.8){
      const h=Math.random()<.4?'high':'mid';
      const py=h==='high'?ROAD_TOP-80-Math.random()*70:ROAD_TOP-25-Math.random()*55;
      const pw=55+Math.random()*80;
      platforms.push({x:sx+Math.random()*70,y:py,w:pw,h:12,neonColor:['#ff006e','#00f5ff','#7209b7'][Math.floor(Math.random()*3)],hasTrap:Math.random()<.08});
      if(h==='high'&&Math.random()<.7)routeMarkers.push({x:sx-8,y:GROUND_Y-20,w:16,h:16});
    }
  }
  // 高层长平台 —— 更密集
  for(let sx=stX;sx<lv.endX;sx+=220+Math.random()*120){
    if(Math.random()<.8){
      const py=ROAD_TOP-100-Math.random()*90;
      const pw=120+Math.random()*250;
      const pColor=['#ff006e','#00f5ff','#7209b7','#4cc9f0','#f72585'][Math.floor(Math.random()*5)];
      upperPlatforms.push({x:sx,y:py,w:pw,h:14,neonColor:pColor,hasEnemy:Math.random()<.45,hasTrap:Math.random()<.18,hasSpike:Math.random()<.15});
      routeMarkers.push({x:sx-6,y:GROUND_Y-20,w:14,h:14});
    }
  }
}
function checkPlatforms(){
  if(player.onCar||player.vy<0)return;const pb=getPB();
  for(const pl of neonPlatforms){if(rectsOverlap(pb,{x:pl.x,y:pl.y,w:pl.w,h:pl.h})&&pb.y+pb.h>=pl.y&&pb.y+pb.h<=pl.y+pl.h+6){player.y=pl.y-player.height;player.vy=0;player.jumpsLeft=2;if(pl.hasTrap&&gameTime%18===0&&!isInvincible())hitPlayer(4);}}
  for(const pl of platforms){if(rectsOverlap(pb,pl)&&pb.y+pb.h>=pl.y&&pb.y+pb.h<=pl.y+10){player.y=pl.y-player.height;player.vy=0;player.jumpsLeft=2;if(pl.hasTrap&&gameTime%18===0&&!isInvincible())hitPlayer(5);}}
  for(const pl of upperPlatforms){if(rectsOverlap(pb,pl)&&pb.y+pb.h>=pl.y&&pb.y+pb.h<=pl.y+12){player.y=pl.y-player.height;player.vy=0;player.jumpsLeft=2;if((pl.hasTrap||pl.hasSpike)&&gameTime%15===0&&!isInvincible())hitPlayer(pl.hasSpike?8:5);}}
}

  for(let i=spikeTraps.length-1;i>=0;i--){spikeTraps[i].tick=(spikeTraps[i].tick||0)+1;if(spikeTraps[i].x<vl)spikeTraps.splice(i,1);}

        case'shield':shieldOfficers.push({x:ex,y:GROUND_Y-54,w:36,h:54,shieldW:20,alive:true,hp:30});break;
        case'rifle':riflePolice.push({x:ex,y:GROUND_Y-44,w:28,h:44,shootTimer:100+Math.random()*60,alive:true,hp:20});break;
        case'riot':riotPolice.push({x:ex,y:GROUND_Y-64,w:42,h:64,attackTimer:0,attacking:false,alive:true,hp:50,aggro:false,aggroTimer:0});break;
      }spParticles(sc.x+sc.w/2,sc.y,6,'#ff1744',3,10);playBeep(400,.04,'square',.03);
    }

// ==================== 碰撞 ====================
function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function getPB(){return{x:player.x,y:player.y,w:player.width,h:player.isSliding?player.slideHeight:player.height};}

function checkCollisions(){
  if(gameState!==STATE.PLAYING)return;
  const pb=getPB();if(player.vy>=0)checkPlatforms();
  if(isInvincible())return;
  for(const car of policeCars){if(player.onCar===car)continue;const cb={x:car.x,y:car.y,w:car.w,h:car.h};if(rectsOverlap(pb,cb)){const bt=pb.y+pb.h,ct=car.y;if(player.vy>=0&&bt<=ct+10&&bt>=ct-5){player.onCar=car;player.onCarOffsetX=player.x-car.x;player.y=car.y-player.height;player.vy=0;player.jumpsLeft=2;player.isSliding=false;spParticles(player.x+player.width/2,player.y+player.height,8,'#ffeb3b',2,15);playBeep(600,.05);car.passed=true;return;}hitPlayer(10+Math.floor(Math.random()*11));return;}}
  for(const o of officers){if(!o.alive)continue;if(rectsOverlap(pb,{x:o.x,y:o.y,w:o.w,h:o.h})){if(player.vy>0&&pb.y+pb.h<=o.y+18){o.alive=false;player.vy=-7;player.jumpsLeft=1;comboCount++;comboTimer=40;comboMultiplier=Math.min(5,comboMultiplier+1);multiplierDecay=180;score+=50*comboMultiplier;spParticles(o.x+o.w/2,o.y,10,'#00ff88',3,20);playBeep(800,.08);targetZoom=1.08;setTimeout(()=>targetZoom=1,150);return;}if(player.isSliding&&pb.y+pb.h<=o.y+12)return;hitPlayer(5);return;}}
  for(const c of chargerPolice){if(!c.alive)continue;if(rectsOverlap(pb,{x:c.x,y:c.y,w:c.w,h:c.h})){if(player.vy>0&&pb.y+pb.h<=c.y+20){c.alive=false;player.vy=-7;comboCount++;comboMultiplier=Math.min(5,comboMultiplier+1);multiplierDecay=180;score+=60*comboMultiplier;spParticles(c.x+c.w/2,c.y,12,'#ff9100',4,22);playBeep(800,.08);return;}if(shopData.defenseEquipped==='shield'&&shopData.shieldCD<=0&&Math.random()<.5){shopData.shieldCD=150;spParticles(player.x+player.width/2,player.y+player.height/2,10,'#00f5ff',3,15);playBeep(1000,.06);return;}hitPlayer(6+Math.floor(Math.random()*5));return;}}
  for(const s of shieldOfficers){if(!s.alive)continue;if(rectsOverlap(pb,{x:s.x,y:s.y,w:s.w,h:s.h})){const sb={x:s.x+s.shieldW,y:s.y,w:s.w-s.shieldW,h:s.h};if(rectsOverlap(pb,sb)&&pb.x+pb.w>sb.x){if(player.vy>0){s.alive=false;player.vy=-7;comboCount++;comboMultiplier=Math.min(5,comboMultiplier+1);multiplierDecay=180;score+=60*comboMultiplier;spParticles(s.x+s.w/2,s.y,10,'#ff9100',3,20);playBeep(700,.08);return;}hitPlayer(5);return;}if(player.isSliding)return;hitPlayer(5);return;}}
  // 狙击手子弹已在上方独立处理
  for(const d of drones){const ft=d.y+d.h,fb=ft+d.fieldH;if(pb.x+pb.w>d.x-10&&pb.x<d.x+d.w+10&&pb.y+pb.h>ft&&pb.y<fb){if(!player.isSliding){hitPlayer(5);return;}}}
  for(const l of laserCams){const lx=toSX(l.x),ly=l.wallY;const lex=lx+Math.cos(l.angle)*l.laserLen,ley=ly+Math.sin(l.angle)*l.laserLen;if(pb.x+pb.w>Math.min(lx,lex)&&pb.x<Math.max(lx,lex)&&pb.y+pb.h>Math.min(ly,ley)&&pb.y<Math.max(ly,ley)){if(!l.lastSpawn||l.lastSpawn<gameTime-180){l.lastSpawn=gameTime;
  // 掉落伞兵: 2~4个
  const pCount=2+Math.floor(Math.random()*3);
  for(let i=0;i<pCount;i++){const px=player.x-30+Math.random()*80;paratroopers.push({x:px,y:ROAD_TOP-120-Math.random()*40,vy:1.2,w:22,h:44,landed:false,hp:15,landY:GROUND_Y-44});}
  // 刷新警察: 3~5个
  const oCount=3+Math.floor(Math.random()*3);
  for(let i=0;i<oCount;i++)officers.push({x:player.x-40+Math.random()*120,y:GROUND_Y-48,w:24,h:48,alive:true,hp:15+Math.floor(Math.random()*6),patrolDir:Math.random()>.5?1:-1,patrolRange:40+Math.random()*60,baseX:player.x-40+Math.random()*120});
  spParticles(lx,ly,12,'#ff1744',5,20);playBeep(200,.15,'sawtooth',.06);
  }hitPlayer(Math.floor(5*charCfg.laserMul));return;}}
  for(let i=rifleBullets.length-1;i>=0;i--){const rb=rifleBullets[i];if(rectsOverlap(pb,{x:rb.x-3,y:rb.y-3,w:6,h:6})){rifleBullets.splice(i,1);if(rb.fromGoose){gooseBulletHits++;spParticles(player.x+player.width/2,player.y+player.height/2,10,'#ff0',4,15);playBeep(200,.1,'sawtooth',.06);if(gooseBulletHits>=3){gooseBulletHits=0;hitPlayer(999);return;}return;}hitPlayer(5);return;}}
  for(let i=sniperBullets.length-1;i>=0;i--){const sb=sniperBullets[i];if(rectsOverlap(pb,{x:sb.x-4,y:sb.y-4,w:8,h:8})){sniperBullets.splice(i,1);hitPlayer(25);return;}}
  for(const b of oilBarrels){if(!b.active)continue;if(rectsOverlap(pb,{x:b.x,y:b.y,w:b.w,h:b.h})){b.active=false;spParticles(b.x+b.w/2,b.y+b.h/2,30,'#ff9100',8,35);screenShake=10;flashAlpha=.4;playBeep(80,.3,'sawtooth',.12);for(const o of officers)if(Math.abs(o.x-b.x)<80)o.alive=false;for(const c of chargerPolice)if(Math.abs(c.x-b.x)<80)c.alive=false;if(Math.abs(player.x-b.x)<80)hitPlayer(8);}}
  for(const b of barricades){if(rectsOverlap(pb,{x:b.x,y:b.y,w:b.w,h:b.h})){if(player.isSliding)return;hitPlayer(3);return;}}
  // 防爆警察
  for(const r of riotPolice){if(!r.alive)continue;if(rectsOverlap(pb,{x:r.x,y:r.y,w:r.w,h:r.h})){if(r.attacking){hitPlayer(20);r.attacking=false;r.attackTimer=0;return;}const canJump=player.vy<0&&player.jumpsLeft===0;if(!canJump){const kbDir=player.x<r.x+r.w/2?-1:1;player.knockbackVx=kbDir*8;player.vx=player.knockbackVx;if(!isInvincible()){player.invincibleTimer=20;spParticles(player.x+player.width/2,player.y+player.height/2,6,'#fff',2,8);playBeep(200,.06,'square',.04);}}return;}}
  // 岩浆池
  for(const l of lavaPools){if(rectsOverlap(pb,{x:l.x,y:l.y,w:l.w,h:l.h})){hitPlayer(l.damage);return;}}
  // 钉刺陷阱
  for(const s of spikeTraps){const sh=12;if(rectsOverlap(pb,{x:s.x+4,y:s.y,w:s.w-8,h:sh})){hitPlayer(s.damage);return;}}
  // 减速带
  for(const b of speedBumps){if(rectsOverlap(pb,{x:b.x,y:b.y,w:b.w,h:b.h})){playerBuffs.slowDebuff=90;if(gameTime%30===0)spParticles(player.x+player.width/2,player.y+player.height,4,'#ff0',1,6);}}
  // 伞兵
  for(const p of paratroopers){if(!p.landed)continue;if(rectsOverlap(pb,{x:p.x,y:p.y,w:p.w,h:p.h})){if(player.vy>0&&pb.y+pb.h<=p.y+18){p.hp-=999;player.vy=-7;player.jumpsLeft=1;comboCount++;comboTimer=40;comboMultiplier=Math.min(5,comboMultiplier+1);multiplierDecay=180;score+=40*comboMultiplier;spParticles(p.x+p.w/2,p.y,10,'#ffeb3b',3,20);playBeep(800,.08);return;}hitPlayer(4);return;}}
  // 黑化鹅触碰——带debuff系统
  for(const h of hunterAIs){if(h.respawnTimer>0||h.warning>0)continue;if(rectsOverlap(pb,{x:h.x,y:h.y,w:h.w,h:h.h})){
    // 玩家踩鹅头
    if(player.vy>0&&pb.y+pb.h<=h.y+h.h/3){
      h.hitCount++;player.vy=-7;player.jumpsLeft=1;comboCount++;comboTimer=40;comboMultiplier=Math.min(5,comboMultiplier+1);multiplierDecay=180;score+=80*comboMultiplier;
      applyGooseDebuff(h);
      if(h.hitCount>=2){gooseDefeated(h);return;}
      spParticles(h.x+h.w/2,h.y+h.h/2,12,'#00f5ff',4,18);playBeep(900,.08);return;
    }
    // 鹅碰玩家——一下秒
    if(h.debuff==='weak'){hitPlayer(15);}else{hitPlayer(999);}
    return;
  }}
  if(bossData)updateBoss();
}

function hitPlayer(dmg){
  if(isInvincible())return;
  // 护盾道具(蓝色buff)
  if(playerBuffs.shieldTimer>0){playerBuffs.shieldTimer=0;spParticles(player.x+player.width/2,player.y+player.height/2,15,'#00f5ff',5,20);playBeep(1000,.06);return;}
  // 举盾防御——防任何伤害，50%破盾进5秒CD
  if(shopData.activeSlot===1&&shopData.defenseEquipped==='shield'&&shopData.shieldCD<=0){
    spParticles(player.x+player.width/2,player.y+player.height/2,12,'#00f5ff',4,18);playBeep(800,.06,'square',.05);
    if(Math.random()<.5){shopData.shieldCD=300;spParticles(player.x+player.width/2,player.y+player.height/2,8,'#ff1744',5,15);playBeep(150,.15,'sawtooth',.06);}
    return;
  }
  const reduction=getArmorReduction(),realDmg=Math.ceil(dmg*(1-reduction));player.hp-=realDmg;player.invincibleTimer=90;screenShake=20;flashAlpha=.6;comboCount=0;comboMultiplier=1;multiplierDecay=0;
  spParticles(player.x+player.width/2,player.y+player.height/2,20,'#ff1744',4,25);playBeep(150,.3,'sawtooth',.1);if(player.onCar){player.onCar=null;player.vy=-4;}if(player.hp<=0)gameOver();
}

// ==================== 玩家更新 ====================
function updatePlayer(){
  if(gameState!==STATE.PLAYING)return;
  player.animTimer++;if(player.invincibleTimer>0)player.invincibleTimer--;if(player.slideCooldown>0)player.slideCooldown--;if(shopData.shieldCD>0)shopData.shieldCD--;
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)comboCount=0;}if(multiplierDecay>0){multiplierDecay--;if(multiplierDecay<=0)comboMultiplier=1;}
  const onGround=player.onCar!==null||player.y+player.height>=GROUND_Y;
  if(player.onCar){const c=player.onCar;player.x=c.x+player.onCarOffsetX;player.y=c.y-player.height;player.vy=0;player.jumpsLeft=2;if(c.x+c.w<cameraX-100)player.onCar=null;}
  if(!player.onCar){
    if(player.knockbackVx!==0){player.x+=player.knockbackVx;player.knockbackVx*=.85;if(Math.abs(player.knockbackVx)<.3)player.knockbackVx=0;}
    else{const ts=getPlayerSpeed();if(keys['KeyA']){player.targetVx=-ts;player.facingRight=false;multiplierDecay=Math.max(multiplierDecay,120);}else if(keys['KeyD']){player.targetVx=ts;player.facingRight=true;multiplierDecay=Math.max(multiplierDecay,120);}else{player.targetVx=0;}const accel=.45;if(Math.abs(player.vx-player.targetVx)<accel)player.vx=player.targetVx;else player.vx+=Math.sign(player.targetVx-player.vx)*accel;}
    player.x+=player.vx;if(player.x<0){player.x=0;player.vx=0;player.knockbackVx=0;}distance=Math.max(distance,player.x);
  }
  if(keys['KeyW']&&!prevW){if(onGround||player.jumpsLeft>=2){player.vy=getJumpVel();player.jumpsLeft=1;player.isSliding=false;player.onCar=null;playBeep(500,.06);}else if(wantDoubleJump&&player.jumpsLeft>=1&&!player.isSliding){player.vy=getDJumpVel();player.jumpsLeft=0;wantDoubleJump=false;spParticles(player.x+player.width/2,player.y+player.height,6,'#00f5ff',2,12);playBeep(700,.06);}wantDoubleJump=false;multiplierDecay=Math.max(multiplierDecay,120);}
  if(keys['KeyS']&&!prevS&&onGround&&player.knockbackVx===0&&player.slideCooldown<=0&&!player.isSliding){player.isSliding=true;player.slideTimer=charCfg.slideLen;player.slideCooldown=charCfg.slideCD;player.onCar=null;playBeep(300,.04,'square',.03);}
  if(player.isSliding){player.slideTimer--;if(player.slideTimer<=0)player.isSliding=false;}
  if(!player.onCar){player.vy+=GRAVITY;player.y+=player.vy;if(player.y+player.height>=GROUND_Y){if(player.vy>3)spParticles(player.x+player.width/2,player.y+player.height,3,'#aaa',1,8);player.y=GROUND_Y-player.height;player.vy=0;player.jumpsLeft=2;if(!player.isSliding&&player.slideTimer<=0)player.isSliding=false;}}
  if(keys['KeyF']&&!prevF)useWeapon();
  // 氮气加速：Shift键
  nitroActive=false;
  if((keys['ShiftLeft']||keys['ShiftRight'])&&nitroEnergy>0&&gameState===STATE.PLAYING){nitroActive=true;nitroEnergy=Math.max(0,nitroEnergy-20/60);}
  else if(nitroEnergy<100){nitroEnergy=Math.min(100,nitroEnergy+2/60);}
  if(nitroActive&&gameTime%2===0){const dir=player.facingRight?-1:1;const bx=player.facingRight?player.x:player.x+player.width;const py=player.y+player.height/2;for(let i=0;i<4;i++){particles.push({x:bx,y:py-4+Math.random()*8,vx:player.vx+dir*(1+Math.random()*2),vy:(Math.random()-.5)*2,life:20,maxLife:20,color:'#00f5ff',size:3+Math.random()*4});particles.push({x:bx,y:py-4+Math.random()*8,vx:player.vx+dir*(1+Math.random()*1.5),vy:(Math.random()-.5)*1,life:16,maxLife:16,color:'#fff',size:2+Math.random()*3});}if(gameTime%5===0)particles.push({x:bx,y:py,vx:player.vx+dir*(2+Math.random()*3),vy:(Math.random()-.5)*1,life:25,maxLife:25,color:'#ff0',size:5+Math.random()*5});}
  // 1/2键切换物品栏
  if(keys['Digit1']&&!prevDigit1g){shopData.activeSlot=0;}
  if(keys['Digit2']&&!prevDigit2g){shopData.activeSlot=1;}
}

// ==================== UI ====================
function drawUI(ctx){
  ctx.textAlign='left';
  // 警灯
  if(gameState===STATE.PLAYING){const rl=Math.floor(gameTime/12)%2;ctx.shadowColor=rl?'#ff1744':'#0044ff';ctx.shadowBlur=20;ctx.fillStyle=rl?'rgba(255,23,68,.1)':'rgba(0,68,255,.1)';ctx.fillRect(0,0,3,H);ctx.fillRect(W-3,0,3,H);ctx.shadowBlur=0;}

  // ===== 左上角：HP + 氮气 =====
  const maxHp=getMaxHP(),hpRatio=Math.max(0,player.hp/maxHp);
  const hpColor=hpRatio>.6?'#00ff88':hpRatio>.3?'#ffeb3b':'#ff1744';
  // HP条背景

  ctx.beginPath();ctx.roundRect(14,27,162*hpRatio,7,3);ctx.fill();ctx.shadowBlur=0;

  const nRatio=nitroEnergy/100;

  ctx.beginPath();ctx.roundRect(14,37,162*nRatio,5,2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle=nitroActive?'#00f5ff':'#666';ctx.font='bold 7px';ctx.fillText(`N2O ${Math.floor(nitroEnergy)}`,96,42);

  ctx.textAlign='left';

  // ===== 黑化鹅追杀提示 =====
  if(gameState===STATE.PLAYING&&hunterAIs.length>0&&hunterAIs[0].warning<=0){
    const pulse=Math.sin(gameTime*.12)*.4+.6;
    ctx.fillStyle=`rgba(0,0,0,${.55+pulse*.15})`;ctx.strokeStyle='rgba(255,60,60,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(W/2-100,6,200,28,8);ctx.fill();ctx.stroke();

  ctx.fillStyle=player.slideCooldown<=0?'#0f0':'#444';ctx.fillText(`🛝滑铲`,lx+70,ly+2);
  let by=ly+16;
  if(playerBuffs.shieldTimer>0){ctx.fillStyle='#0ff';ctx.fillText(`🛡${Math.ceil(playerBuffs.shieldTimer/60)}s`,lx+4,by);by+=12;}
  if(playerBuffs.magnetTimer>0){ctx.fillStyle='#f06';ctx.fillText(`🧲${Math.ceil(playerBuffs.magnetTimer/60)}s`,lx+4,by);by+=12;}
  if(playerBuffs.slowTimer>0||playerBuffs.slowDebuff>0){ctx.fillStyle=playerBuffs.slowTimer>0?'#70b':'#ffeb3b';ctx.fillText(playerBuffs.slowTimer>0?`🐌${Math.ceil(playerBuffs.slowTimer/60)}s`:`⚠减速${Math.ceil(playerBuffs.slowDebuff/60)}s`,lx+4,by);}

  // ===== 底部中央：物品栏 =====
  const iy=H-18,ix=Math.max(W/2-105,20);
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(ix-4,iy-18,210,30,6);ctx.fill();ctx.stroke();

  ctx.fillStyle=shopData.activeSlot===0?'#00ff88':'#888';ctx.fillText('1',ix,iy-2);
  if(shopData.weaponEquipped){const wn={knife:'🔪刀',sword:'🗡️剑',pistol:'🔫枪',bomb:'💣炸',flash:'💥闪'};ctx.fillStyle='#fff';ctx.fillText(wn[shopData.weaponEquipped],ix+14,iy-2);ctx.fillText('F',ix+58,iy-2);}
  else{ctx.fillStyle='#555';ctx.fillText('空',ix+14,iy-2);}
  ctx.fillStyle=shopData.activeSlot===1?'#00ff88':'#888';ctx.fillText('2',ix+80,iy-2);
  if(shopData.defenseEquipped==='shield'){ctx.fillStyle='#00f5ff';ctx.fillText(`🛡${shopData.shieldCD>0?Math.ceil(shopData.shieldCD/60)+'s':'就绪'}`,ix+94,iy-2);}
  else{ctx.fillStyle='#555';ctx.fillText('空',ix+94,iy-2);}
  if(shopData.armorLevel>0){ctx.fillStyle=shopData.armorEquipped?'#0f0':'#ff0';ctx.font='9px';ctx.fillText(`甲${shopData.armorLevel}`,ix+156,iy-2);ctx.font='bold 10px';}

  if(flashAlpha>0){ctx.fillStyle=`rgba(255,23,68,${flashAlpha})`;ctx.fillRect(0,0,W,H);flashAlpha-=.03;if(flashAlpha<0)flashAlpha=0;}
  if(flashEffect>0){ctx.fillStyle=`rgba(255,255,255,${.3+(flashEffect/120)*.3})`;ctx.fillRect(0,0,W,H);}
  const nearJam=signalJammers.find(j=>{const dx=player.x+player.width/2-j.x,dy=player.y+player.height/2-j.y;return Math.sqrt(dx*dx+dy*dy)<j.jamRadius&&j.duration>0;});
  if(nearJam){ctx.fillStyle='rgba(72,9,130,.2)';ctx.fillRect(0,0,W,H);}

  if(gameState===STATE.START)drawStart(ctx);
  if(gameState===STATE.CHAR_SELECT)drawChar(ctx);
  if(gameState===STATE.SHOP)drawShop(ctx);
  if(gameState===STATE.LEVEL_COMPLETE)drawLevelWin(ctx);

  // 鼠标准星
  if(gameState===STATE.PLAYING){ctx.strokeStyle='rgba(255,0,0,.7)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mouseX,mouseY,8,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(mouseX-4,mouseY);ctx.lineTo(mouseX+4,mouseY);ctx.moveTo(mouseX,mouseY-4);ctx.lineTo(mouseX,mouseY+4);ctx.stroke();}
}

function buyItem(k){
  const items={
    'Digit0':{c:12,ok:()=>shopData.weaponEquipped==='sword',b:()=>{shopData.weaponEquipped='sword';}},
    'Digit1':{c:8,ok:()=>shopData.weaponEquipped==='knife',b:()=>{shopData.weaponEquipped='knife';}},
    'Digit2':{c:15,ok:()=>shopData.weaponEquipped==='pistol',b:()=>{shopData.weaponEquipped='pistol';shopData.pistolAmmo=getPistolMaxAmmo();}},
    'Digit3':{c:12,ok:()=>shopData.weaponEquipped==='bomb',b:()=>{shopData.weaponEquipped='bomb';shopData.bombCount=3;}},
    'Digit4':{c:10,ok:()=>shopData.weaponEquipped==='flash',b:()=>{shopData.weaponEquipped='flash';shopData.flashCount=3;}},
    'Digit5':{c:6,ok:()=>shopData.knifeDmg>=10,b:()=>shopData.knifeDmg++},
    'Digit6':{c:6,ok:()=>shopData.knifeCD>=5,b:()=>shopData.knifeCD++},
    'Digit7':{c:6,ok:()=>shopData.pistolDmg>=10,b:()=>shopData.pistolDmg++},
    'Digit8':{c:8,ok:()=>shopData.bombDmg>=10,b:()=>shopData.bombDmg++},
    'Digit9':{c:10,ok:()=>shopData.defenseEquipped==='shield',b:()=>{shopData.defenseEquipped='shield';shopData.shield=true;}},
    'KeyQ':{c:15,ok:()=>shopData.armorLevel>=1,b:()=>shopData.armorLevel=1},
    'KeyU':{c:25,ok:()=>shopData.armorLevel>=2,nd:()=>shopData.armorLevel>=1,b:()=>shopData.armorLevel=2},
    'KeyI':{c:40,ok:()=>shopData.armorLevel>=3,nd:()=>shopData.armorLevel>=2,b:()=>shopData.armorLevel=3},
    'KeyO':{c:0,ok:()=>false,b:()=>{shopData.armorEquipped=!shopData.armorEquipped;}},
    'KeyR':{c:8,ok:()=>shopData.jumpUpgrade>=10,b:()=>shopData.jumpUpgrade++},
    'KeyT':{c:8,ok:()=>shopData.speedUpgrade>=10,b:()=>shopData.speedUpgrade++},
    'KeyY':{c:10,ok:()=>shopData.hpUpgrade>=10,b:()=>shopData.hpUpgrade++},
  };
  const si=items[k];if(!si||si.ok()||(si.nd&&!si.nd())||totalCoins<si.c)return;
  totalCoins-=si.c;si.b();playMelody([[800,.06],[1000,.06],[1200,.08]]);saveShopData();
}

function drawLevelWin(ctx){ctx.fillStyle='rgba(5,5,26,.8)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#0f0';ctx.shadowBlur=30;ctx.font=`bold ${Math.min(38,W*.04)}px "Courier New"`;ctx.fillText(`关卡${currentLevel}通关！`,W/2,H*.24);ctx.shadowBlur=0;ctx.fillStyle='#0ff';ctx.fillText(`${LEVELS[currentLevel].name} 得分:${Math.floor(score)} 金币:${levelCoins}`,W/2,H*.36);if(currentLevel<TOTAL_LEVELS){ctx.fillStyle='#aaa';ctx.fillText(`下一关:${LEVELS[currentLevel+1].name}`,W/2,H*.48);const p=Math.sin(gameTime*.08)*.4+.6;ctx.fillStyle=`rgba(0,255,136,${p})`;ctx.shadowColor='#0f0';ctx.shadowBlur=12;ctx.font='bold 16px';ctx.fillText('按任意键进入商店',W/2,H*.58);ctx.shadowBlur=0;}ctx.textAlign='left';}
function drawDeath(ctx){ctx.fillStyle='rgba(5,5,26,.85)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#f44';ctx.shadowBlur=20;ctx.font=`bold ${Math.min(36,W*.04)}px "Courier New"`;ctx.fillText('游戏结束',W/2,H*.22);ctx.shadowBlur=0;ctx.fillStyle='#0ff';ctx.fillText(`关卡:${currentLevel}/${TOTAL_LEVELS} 得分:${Math.floor(score)} 金币:${totalCoins}`,W/2,H*.34);const p=Math.sin(gameTime*.06)*.4+.6;ctx.fillStyle=`rgba(0,245,255,${p})`;ctx.font='bold 15px';ctx.fillText('按任意键重新开始',W/2,H*.46);ctx.textAlign='left';}
function drawAllWin(ctx){ctx.fillStyle='rgba(5,5,26,.85)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ff0';ctx.shadowBlur=30;ctx.font=`bold ${Math.min(44,W*.05)}px "Courier New"`;ctx.fillText('🎉20关全通！',W/2,H*.24);ctx.shadowBlur=0;ctx.fillStyle='#0ff';ctx.fillText(`得分:${Math.floor(score)} 金币:${totalCoins}`,W/2,H*.36);ctx.fillStyle='#ff0';ctx.font='bold 16px';ctx.fillText('按任意键重新挑战',W/2,H*.48);ctx.textAlign='left';}

// ==================== 主循环 ====================
function update(){
  gameTime++;
  // 清除存档确认倒计时
  if(clearConfirm>0)clearConfirm--;
  // 每10帧(0.17秒)自动保存
  if(gameTime%10===0){saveTotalCoins();saveShopData();}
  if(gameState!==STATE.PLAYING){
    if(gameState===STATE.CHAR_SELECT){if(keys['KeyA']&&!prevCharA){const c=Object.keys(CHAR_TYPES);const i=c.indexOf(selectedChar);selectedChar=c[(i-1+c.length)%c.length];}if(keys['KeyD']&&!prevCharD){const c=Object.keys(CHAR_TYPES);selectedChar=c[(c.indexOf(selectedChar)+1)%c.length];}if(keys['KeyW']&&!prevCharW){applyCharConfig();gameState=STATE.SHOP;prevShopConfirm=true;}}
    if(gameState===STATE.SHOP){for(const k of['Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Digit0','KeyQ','KeyU','KeyI','KeyO','KeyR','KeyT','KeyY']){if(keys[k]&&!prevShopK[k])buyItem(k);}if((keys['KeyW']||keys['Space'])&&!prevShopConfirm){if(shopAfterComplete)nextLevel();else startGame();}}
    prevCharA=!!keys['KeyA'];prevCharD=!!keys['KeyD'];prevCharW=!!keys['KeyW'];
    for(const k of['Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Digit0','KeyQ','KeyU','KeyI','KeyO','KeyR','KeyT','KeyY'])prevShopK[k]=!!keys[k];
    prevShopConfirm=!!(keys['KeyW']||keys['Space']);return;
  }
  if(player.x>=levelEndX-20&&!bossData){levelComplete();return;}
  score+=.1;updatePlayer();updateCamera();spawnEnemies();updEnemies();checkCollisions();
  updParticles();updItems();spawnItemsRandom();checkItemPickup();updWeapons();
  if(screenShake>0)screenShake--;
}

function draw(){
  ctx.clearRect(0,0,W,H);let sx=0,sy=0;if(screenShake>0){sx=(Math.random()-.5)*screenShake;sy=(Math.random()-.5)*screenShake;}
  ctx.save();ctx.translate(sx,sy);ctx.scale(cameraZoom,cameraZoom);
  drawBackground(ctx);drawLaserCams(ctx);drawDrones(ctx);drawCars(ctx);drawOfficers(ctx);drawSnipers(ctx);
  drawShield(ctx);drawCharger(ctx);drawRifle(ctx);drawRiot(ctx);drawBarrels(ctx);drawWalls(ctx);drawSpeedBumps(ctx);drawLava(ctx);drawSpikes(ctx);drawJammers(ctx);drawParatroopers(ctx);drawHunterAIs(ctx);drawSpawnerCages(ctx);
  drawItems(ctx);drawBoss(ctx);
  for(const p of particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);ctx.globalAlpha=1;}
  drawPlayer(ctx);ctx.restore();drawUI(ctx);
}

function gameLoop(){update();draw();prevW=!!keys['KeyW'];prevS=!!keys['KeyS'];prevF=!!keys['KeyF'];prevDigit1g=!!keys['Digit1'];prevDigit2g=!!keys['Digit2'];requestAnimationFrame(gameLoop);}
let prevCharA=false,prevCharD=false,prevCharW=false,prevArmor1=false,prevArmor2=false,prevArmorW=false,prevShopK={},prevShopConfirm=false;

function startGame(){
  initAudio();applyCharConfig();resetPlayer(false);clearAllEnemies();items=[];bossProjectiles=[];particles=[];weaponProjectiles=[];bombEffects=[];
  playerBuffs={shieldTimer:0,magnetTimer:0,slowTimer:0};weaponCooldown=0;flashEffect=0;knifeSwingActive=0;
  score=0;distance=0;comboCount=0;comboTimer=0;screenShake=0;flashAlpha=0;gameTime=0;comboMultiplier=1;multiplierDecay=0;levelCoins=0;nitroEnergy=100;
  currentLevel=1;levelEndX=LEVELS[1].endX;cameraX=player.x-W*.35;cameraZoom=1;targetZoom=1;
  if(shopData.weaponEquipped==='bomb')shopData.bombCount=3;
  if(shopData.weaponEquipped==='flash')shopData.flashCount=3;
  spawnCD={car:70,officer:50,sniper:140,drone:180,laser:100,shield:130,barrel:200,barricade:180,jammer:300,charger:180,rifle:250,riot:650,lava:100,spike:75,spawner:300,hunter:200,bump:320};
  itemSpawnCD=60;generatePlatforms();gameState=STATE.PLAYING;player.y=GROUND_Y-player.height;startBGM();startAmbient();
}

window.addEventListener('keydown',function h(e){
  if(gameState===STATE.START){return;}
  if(gameState===STATE.LEVEL_COMPLETE&&currentLevel<TOTAL_LEVELS){e.preventDefault();shopAfterComplete=true;gameState=STATE.SHOP;prevShopConfirm=true;saveTotalCoins();return;}
  if(gameState===STATE.WIN){e.preventDefault();gameState=STATE.START;return;}
  if(gameState===STATE.GAMEOVER){e.preventDefault();shopAfterComplete=false;gameState=STATE.CHAR_SELECT;return;}
});
canvas.addEventListener('mousedown',function(e){
  const cr=canvas.getBoundingClientRect(),mx=e.clientX-cr.left,my=e.clientY-cr.top;
  mouseX=mx;mouseY=my;mouseDown=true;
  if(gameState===STATE.PLAYING){useWeapon();return;}
  if(gameState===STATE.START){
    // 检查滑块拖拽
    const sx=W*.2,sw=W*.6,sy=H*.62;
    if(Math.abs(my-sy)<18){draggingSlider=true;sfxVolume=Math.max(0,Math.min(100,Math.round((mx-sx)/sw*100)));
      if(sfxGain)sfxGain.gain.value=sfxVolume/100;try{localStorage.setItem('ng_sfx_vol',sfxVolume)}catch(e){}return;}
  }
});
canvas.addEventListener('mousemove',function(e){
  const cr=canvas.getBoundingClientRect(),mx=e.clientX-cr.left,my=e.clientY-cr.top;
  mouseX=mx;mouseY=my;
  if(draggingSlider&&gameState===STATE.START){
    const sx=W*.2,sw=W*.6;sfxVolume=Math.max(0,Math.min(100,Math.round((mx-sx)/sw*100)));
    if(sfxGain)sfxGain.gain.value=sfxVolume/100;try{localStorage.setItem('ng_sfx_vol',sfxVolume)}catch(e){}
  }
});
canvas.addEventListener('mouseup',function(){mouseDown=false;draggingSlider=false;});
canvas.addEventListener('click',function(e){
  const cr=canvas.getBoundingClientRect(),mx=e.clientX-cr.left,my=e.clientY-cr.top;
  if(gameState===STATE.START){
    // 清除存档按钮
    const ccx=W*.65,ccy=H*.785,ccw=100,cch=22;
    if(mx>ccx-ccw/2&&mx<ccx+ccw/2&&my>ccy-cch/2&&my<ccy+cch/2){
      if(clearConfirm>0){clearAllData();return;}
      clearConfirm=180;e.stopPropagation();return;
    }
    // 检查开始按钮
    const bx=W/2,by=H*.46,bw=180,bh=44;
    if(mx>bx-bw/2&&mx<bx+bw/2&&my>by-bh/2&&my<by+bh/2){gameState=STATE.CHAR_SELECT;return;}
    clearConfirm=0;return;
  }
  if(gameState===STATE.LEVEL_COMPLETE&&currentLevel<TOTAL_LEVELS){shopAfterComplete=true;gameState=STATE.SHOP;prevShopConfirm=true;saveTotalCoins();return;}
  if(gameState===STATE.WIN){gameState=STATE.START;return;}
  if(gameState===STATE.GAMEOVER){shopAfterComplete=false;gameState=STATE.CHAR_SELECT;return;}
});
canvas.tabIndex=0;canvas.focus();canvas.addEventListener('click',()=>canvas.focus());
window.addEventListener('beforeunload',()=>{saveTotalCoins();saveShopData();});
try{const v=parseInt(localStorage.getItem('ng_sfx_vol'));if(!isNaN(v))sfxVolume=v}catch(e){}
loadShopData();loadTotalCoins();resetPlayer(false);player.y=GROUND_Y-player.height;gameLoop();
</script>
</body>
